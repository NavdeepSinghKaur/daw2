<div class="d-flex">
    <h1 class="m-auto mt-5">Gestionar conexions</h1>
</div>
<div class="d-flex justify-content-center mt-5">
    <form (ngSubmit)="sendRequest()" class="d-none d-md-flex align-items-center gap-2" style="max-width: 500px;">
        <label for="searchUser" class="form-label mb-0 text-nowrap">Enviar petició</label>
        <div class="input-group">
            <input type="text" id="searchUser" name="searchUser" [(ngModel)]="targetUser" class="form-control"
                placeholder="Usuari...">
            <button type="submit" class="btn btn-primary">Enviar</button>
        </div>
    </form>
</div>

<div class="d-flex mt-5">
    <div class="d-block mx-auto">
        <p class="mx-auto">Llista de les teves conexions</p>
        @for (friend of friends(); track $index) {
        <div class="d-flexbox">
            <p>{{friend}}</p>
        </div>
        }
    </div>

    <!-- <div class="d-flex mt-5"> -->
    <div class="d-block mx-auto">
        <p class="mx-auto">Conexions pendents</p>
        @for (pending of pending(); track $index) {
        <div class="d-flexbox">
            <p>{{pending}}</p>
            <button class="btn btn-primary" (click)="acceptRequest(pending)">Acceptar</button>
            <button class="btn btn-danger" (click)="rejectRequest(pending)">Rebutjar</button>
        </div>
        }
    </div>
    <!-- </div> -->

    <!-- <div class="d-flex mt-5"> -->
    <div class="d-block mx-auto">
        <p class="mx-auto">Conexions enviades</p>
        @for (sent of sent(); track $index) {
        <div class="d-flexbox">
            <p>{{sent}}</p>
            <button class="btn btn-primary">Cancelar</button>
        </div>
        }
    </div>
    <!-- </div> -->
