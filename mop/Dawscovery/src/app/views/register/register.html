<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-sm p-4" style="width: 400px;">
        <h2 class="text-center mb-4">Registrar-se</h2>
        <form (ngSubmit)="register()">
            <div class="mb-3">
                <label class="form-label">Usuari (email)</label>
                <input type="text" class="form-control" [(ngModel)]="username" name="username">
            </div>
            <div class="mb-3">
                <label class="form-label">Contrasenya</label>
                <input type="password" class="form-control" [(ngModel)]="password" name="password">
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-2">Registrar-se</button>
        </form>
        <p>Ja tens compte? <a routerLink="/login">Inicia sessió</a></p>
    </div>
</div>
