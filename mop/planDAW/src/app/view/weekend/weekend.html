<div id="imageCarousel" class="carousel slide w-50 mx-auto mb-5" data-bs-ride="carousel">
  <div class="carousel-inner">
    @for (image of getAllImages; track $index; let i = $index) {
      <div class="carousel-item" [class.active]="i === 0">
        <img [src]="image" class="d-block w-100">
      </div>
    }
  </div>
</div>
<form action="" class="p-4 border rounded-4 shadow-sm w-50 mx-auto mb-5">
  <div class="form-group">
    <label for="title" class="fw-bold mt-2">Títol</label>
    <input type="text" class="form-control" id="title" name="title" [(ngModel)]="title" required>
  </div>
  <div class="form-group">
    <label for="duration" class="fw-bold mt-2">Duració</label>
    <input type="text" class="form-control" id="duration" name="duration" [(ngModel)]="duration" required>
  </div>
  <div class="form-group">
    <label for="description" class="fw-bold mt-2">Descripció</label>
    <input type="text" class="form-control" id="description" name="description" [(ngModel)]="description" required>
  </div>
  <div class="form-group">
    <label for="image" class="fw-bold mt-2">Imatge</label>
    <input type="text" class="form-control" id="image" name="image" [(ngModel)]="image" required>
  </div>
  <div class="form-group">
    <label for="type" class="fw-bold mt-2">Tipus d'idea</label>
    <input type="text" class="form-control" id="type" name="type" [(ngModel)]="type" required>
  </div>
  <button type="submit" class="btn btn-primary btn-block rounded-3" (click)="generateNewIdea()">Guardar</button>
</form>
