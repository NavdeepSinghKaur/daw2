<form>
    <input class="form-control" type="text" placeholder="Títol de la peça" [(ngModel)]="songTitle" name="songTitle" >
    <input class="form-control" type="text" placeholder="Nom del grup o de l'artista" [(ngModel)]="artistName" name="artistName" >
    <input class="form-control" type="text" placeholder="Enllaç a la peça" [(ngModel)]="songUrl" name="songUrl" >
    <input class="form-control" type="text" placeholder="Imatge del disc" [(ngModel)]="songImage" name="songImage" >
    <textarea class="form-control" name="" id="" placeholder="Descripció" [(ngModel)]="description" name="description" ></textarea>

    <button class="btn btn-warning me-3" >Cancel·lar</button>
    <button class="btn btn-danger  me-3" >Esborrar</button>
    <button class="btn btn-success"  (click)="addSong()" >Afegir</button>
</form>
