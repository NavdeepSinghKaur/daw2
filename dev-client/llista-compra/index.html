<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llista de la compra</title>
    <!-- Minimalist styles added to the header -->
    <style>
        /* Global styles for a clean, modern look */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
            color: #333;
            max-width: 600px;
            margin: 20px auto;
        }

        /* Styles for the main heading */
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #1b6ea5;
            padding-bottom: 10px;
            font-size: 1.5em;
            text-align: center;
        }

        /* Styles for input and button containers */
        input, button {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 9px;
            font-size: 1em;
            box-sizing: border-box; /* Ensures padding doesn't affect total width */
        }

        /* Input field styling for responsiveness */
        input {
            width: 80%;   
        }

        /* Button styles for a clean, actionable look */
        button {
            width: 100px;
            background-color: #000000;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #306d96;
        }

        /* Styles for the shopping list */
        ul {
            list-style-type: none;
            padding: 0;
            margin-top: 0;
        }

        /* Styles for individual list items */
        li {
            background-color: #eeeeee;
            padding: 7px 15px;
            margin-bottom: 2rem;
            border-radius: 11px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

    </style>
</head>
<body>
    <input type="text" id="itemToAdd">
    <button onclick="addItem()">Afegir</button>    

    <h1>Llista compra</h1>
    <ul id="itemList">
        <!-- List items will be added here by main.js -->
    </ul>
    <!-- Changed the ID of this span to avoid conflict with the UL, assuming it's for messages -->
    <!-- <span id="feedbackMessage"></span>  -->

    <script src="main.js"></script>
</body>
</html>
